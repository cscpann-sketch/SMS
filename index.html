<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#075E54">
<title>Live Chat</title>
<style>
  :root{
    --primary:#128C7E;
    --primary-dark:#075E54;
    --bg:#ECE5DD;
    --bubble-admin:#DCF8C6;
    --bubble-visitor:#FFFFFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;overflow:hidden;
    height:100%;height:100dvh;
    position:fixed;inset:0;
  }
  body{
    font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);
    display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    background:var(--primary-dark);color:#fff;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;
    flex-shrink:0;
  }
  header h1{font-size:16px;margin:0;font-weight:600;}
  #status{font-size:12px;opacity:.85;}

  /* ---------- Visitor chat ---------- */
  #visitorChat{flex:1;display:flex;flex-direction:column;height:100%;min-height:0;}
  #messages{
    flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;
  }
  .msg{
    max-width:75%;padding:8px 12px;border-radius:10px;font-size:14px;
    line-height:1.4;box-shadow:0 1px 1px rgba(0,0,0,.1);word-wrap:break-word;
  }
  .msg.from-visitor{align-self:flex-end;background:var(--bubble-admin);}
  .msg.from-admin{align-self:flex-start;background:var(--bubble-visitor);}
  .msg .time{display:block;font-size:10px;color:#888;margin-top:3px;text-align:right;}
  .msg video{max-width:100%;border-radius:8px;display:block;margin-top:2px;}
  #inputRow{
    display:flex;padding:10px;background:#f0f0f0;gap:8px;align-items:center;
  }
  #inputRow .attachBtn{
    background:#fff;color:var(--primary-dark);border:1px solid #ccc;border-radius:50%;
    width:42px;height:42px;font-size:18px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  #inputRow input{
    flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ccc;font-size:14px;outline:none;
  }
  #inputRow button{
    background:var(--primary);color:#fff;border:none;border-radius:50%;
    width:42px;height:42px;font-size:18px;cursor:pointer;
  }
  #inputRow button:active{background:var(--primary-dark);}
  .upload-progress{font-size:11px;color:#666;padding:0 10px 6px;flex-shrink:0;}

  /* ---------- Admin panel ---------- */
  #adminPanel{display:flex;flex:1;height:100%;min-height:0;}
  #sessionList{
    width:280px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;flex-shrink:0;
  }
  .session-item{
    padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;position:relative;
  }
  .session-item:hover{background:#f5f5f5;}
  .session-item.active{background:#e8f5f0;}
  .session-item .sid{font-size:13px;font-weight:600;color:#333;}
  .session-item .preview{font-size:12px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .session-item .badge{
    position:absolute;right:12px;top:12px;background:var(--primary);color:#fff;
    border-radius:10px;font-size:10px;padding:2px 6px;
  }
  #chatArea{flex:1;display:flex;flex-direction:column;}
  #chatArea #messages{background:var(--bg);}
  .empty-hint{margin:auto;color:#999;font-size:14px;text-align:center;padding:20px;}
  #backBtn{display:none;background:none;border:none;color:#fff;font-size:20px;margin-right:8px;cursor:pointer;padding:0;}

  @media(max-width:700px){
    #adminPanel{position:relative;overflow:hidden;}
    #sessionList{
      width:100%;position:absolute;inset:0;z-index:1;
      transition:transform .25s ease;
    }
    #chatArea{
      width:100%;position:absolute;inset:0;z-index:2;
      transform:translateX(100%);transition:transform .25s ease;background:var(--bg);
    }
    #adminPanel.chat-open #sessionList{transform:translateX(-100%);}
    #adminPanel.chat-open #chatArea{transform:translateX(0);}
    #adminPanel.chat-open #backBtn{display:inline-block;}
    .session-item .preview{display:block;}
  }

  /* ---------- Call UI ---------- */
  .callBtn{
    background:rgba(255,255,255,0.15);border:none;color:#fff;
    width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;
  }
  .callBtn:active{background:rgba(255,255,255,0.3);}
  #callOverlay{
    position:fixed;inset:0;background:#075E54;z-index:999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
  }
  #incomingCallUI{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .call-avatar{
    width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;font-size:40px;
  }
  #incomingCallText{font-size:16px;}
  .call-actions{display:flex;gap:24px;margin-top:10px;}
  .call-accept, .call-reject, .call-control{
    border:none;border-radius:30px;padding:12px 22px;font-size:14px;cursor:pointer;color:#fff;
  }
  .call-accept{background:#25D366;}
  .call-reject{background:#e53935;}
  .call-control{background:rgba(255,255,255,0.2);width:50px;height:50px;border-radius:50%;padding:0;font-size:18px;}
  #activeCallUI{
    width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;
  }
  #remoteVideo{width:100%;height:100%;object-fit:cover;background:#000;position:absolute;inset:0;}
  #localVideo{
    width:110px;height:150px;object-fit:cover;border-radius:10px;position:absolute;
    top:20px;right:16px;border:2px solid #fff;background:#000;z-index:2;
  }
  #callStatusText{position:absolute;top:20px;left:16px;z-index:2;font-size:13px;background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:12px;}
  #activeCallUI .call-actions{position:absolute;bottom:36px;z-index:2;}

  /* ---------- Minimized call (PiP) so chat stays usable ---------- */
  #callOverlay.minimized{
    inset:auto;top:env(safe-area-inset-top,0);right:10px;
    width:130px;height:170px;border-radius:14px;overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.4);background:#000;z-index:1000;
  }
  #callOverlay.minimized #remoteVideo{position:absolute;inset:0;}
  #callOverlay.minimized #localVideo{width:44px;height:60px;top:6px;right:6px;}
  #callOverlay.minimized #callStatusText{font-size:10px;padding:2px 6px;top:6px;left:6px;}
  #callOverlay.minimized .call-actions{bottom:6px;gap:8px;transform:scale(.7);}
  #callOverlay.minimized #minimizeCallBtn{display:none;}
  #callOverlay.minimized::after{
    content:'Tap to expand';position:absolute;bottom:2px;left:0;right:0;text-align:center;
    font-size:9px;color:#fff;opacity:.8;z-index:2;pointer-events:none;
  }
  body.call-minimized #visitorChat,
  body.call-minimized #adminPanel{ pointer-events:auto; }
</style>
</head>
<body>

<!-- ============ VISITOR VIEW ============ -->
<div id="visitorChat" style="display:none;">
  <header>
    <h1>Support Chat</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="callBtn" id="audioCallBtn" title="Audio call">📞</button>
      <button class="callBtn" id="videoCallBtn" title="Video call">🎥</button>
      <span id="status">connecting...</span>
    </div>
  </header>
  <div id="messages"></div>
  <div id="uploadProgress" class="upload-progress" style="display:none;"></div>
  <div id="inputRow">
    <button class="attachBtn" id="attachBtn" title="Video bhejein">🎥</button>
    <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
    <input type="text" id="msgInput" placeholder="Message likhein..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>
</div>

<!-- ============ ADMIN VIEW ============ -->
<div id="adminPanel" style="display:none;">
  <div id="sessionList"></div>
  <div id="chatArea">
    <header>
      <button id="backBtn" title="Back">←</button>
      <h1 id="chatTitle">Select a chat</h1>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="callBtn" id="adminAudioCallBtn" title="Audio call">📞</button>
        <button class="callBtn" id="adminVideoCallBtn" title="Video call">🎥</button>
        <span id="adminStatus"></span>
      </div>
    </header>
    <div id="adminMessages" class="empty-hint" style="display:flex;">Left side se koi chat select karein</div>
    <div id="adminUploadProgress" class="upload-progress" style="display:none;"></div>
    <div id="adminInputRow" style="display:none;" class="inputRowStyle">
      <div id="inputRow" style="display:flex;">
        <button class="attachBtn" id="adminAttachBtn" title="Video bhejein">🎥</button>
        <input type="file" id="adminVideoFileInput" accept="video/*" style="display:none;">
        <input type="text" id="adminMsgInput" placeholder="Reply likhein..." autocomplete="off">
        <button id="adminSendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ CALL OVERLAY (common) ============ -->
<div id="callOverlay" style="display:none;">
  <div id="incomingCallUI" style="display:none;">
    <div class="call-avatar">📞</div>
    <div id="incomingCallText">Incoming call...</div>
    <div class="call-actions">
      <button id="acceptCallBtn" class="call-accept">✔ Accept</button>
      <button id="rejectCallBtn" class="call-reject">✕ Reject</button>
    </div>
  </div>
  <div id="activeCallUI" style="display:none;">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="callStatusText">Connecting...</div>
    <div class="call-actions">
      <button id="muteBtn" class="call-control">🎤</button>
      <button id="myCamBtn" class="call-control" style="display:none;">📷</button>
      <button id="minimizeCallBtn" class="call-control">💬</button>
      <button id="remoteCamBtn" class="call-control" style="display:none;">📷</button>
      <button id="remoteMicBtn" class="call-control" style="display:none;">🎙️</button>
      <button id="hangupBtn" class="call-reject">✕ End</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* =========================================================
   1) APNA FIREBASE CONFIG YAHAN DAALEIN
   (Firebase console > Project Settings > General > Your apps)
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDpWC8d9zgpTwOaOnC7TW3zggOy1zwWHXU",
  authDomain: "chating-efab6.firebaseapp.com",
  databaseURL: "https://chating-efab6-default-rtdb.firebaseio.com",
  projectId: "chating-efab6",
  storageBucket: "chating-efab6.firebasestorage.app",
  messagingSenderId: "840382270122",
  appId: "1:840382270122:web:a8ab3d5b5e7c4b52fa9ed3",
  measurementId: "G-7VXSD9BVH0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

/* =========================================================
   2) ADMIN VS VISITOR
   Admin ko link kholna h: yourpage.html?admin=1
   Visitor normal link kholega: yourpage.html
   ========================================================= */
const params = new URLSearchParams(location.search);
const isAdmin = params.get('admin') === '1';

auth.signInAnonymously().catch(e=>console.error(e));

auth.onAuthStateChanged(user=>{
  if(!user) return;
  if(isAdmin){
    initAdmin();
  }else{
    initVisitor();
  }
});

/* ---------------- VISITOR LOGIC ---------------- */
function initVisitor(){
  document.getElementById('visitorChat').style.display='flex';

  // Har visitor ke liye ek fixed session id (localStorage me save)
  let sessionId = localStorage.getItem('chatSessionId');
  if(!sessionId){
    sessionId = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    localStorage.setItem('chatSessionId', sessionId);
  }

  const sessionRef = db.collection('liveChats').doc(sessionId);
  sessionRef.set({
    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    unreadForAdmin: 0
  }, {merge:true});

  document.getElementById('status').textContent = 'online';

  const messagesEl = document.getElementById('messages');
  sessionRef.collection('messages').orderBy('time','asc')
    .onSnapshot(snap=>{
      messagesEl.innerHTML='';
      snap.forEach(doc=>{
        const m = doc.data();
        renderMsg(messagesEl, m, m.sender==='visitor', sessionId, doc.id);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

  function sendVisitorMsg(){
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;
    input.value='';
    sessionRef.collection('messages').add({
      text: text,
      sender: 'visitor',
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
    sessionRef.set({
      lastActive: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: text,
      unreadForAdmin: firebase.firestore.FieldValue.increment(1)
    }, {merge:true});
  }

  document.getElementById('sendBtn').addEventListener('click', sendVisitorMsg);
  document.getElementById('msgInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') sendVisitorMsg();
  });

  document.getElementById('attachBtn').addEventListener('click', ()=>{
    document.getElementById('videoFileInput').click();
  });
  document.getElementById('videoFileInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(file) uploadVideo(sessionRef, file, 'visitor', document.getElementById('uploadProgress'));
    e.target.value='';
  });

  // ---- Calling ----
  initCallManager(sessionRef, 'visitor');
  document.getElementById('audioCallBtn').addEventListener('click', ()=> startCall('audio'));
  document.getElementById('videoCallBtn').addEventListener('click', ()=> startCall('video'));
}

/* ---------------- ADMIN LOGIC ---------------- */
function initAdmin(){
  document.getElementById('adminPanel').style.display='flex';
  const sessionListEl = document.getElementById('sessionList');
  let activeSessionId = null;
  let unsubMessages = null;

  db.collection('liveChats').orderBy('lastActive','desc')
    .onSnapshot(snap=>{
      sessionListEl.innerHTML='';
      snap.forEach(doc=>{
        const s = doc.data();
        const item = document.createElement('div');
        item.className = 'session-item' + (doc.id===activeSessionId ? ' active' : '');
        item.innerHTML = `
          <div class="sid">${doc.id.slice(0,10)}...</div>
          <div class="preview">${(s.lastMessage||'').slice(0,30)}</div>
          ${s.unreadForAdmin ? `<span class="badge">${s.unreadForAdmin}</span>` : ''}
        `;
        item.addEventListener('click', ()=> openSession(doc.id));
        sessionListEl.appendChild(item);
      });
    });

  function openSession(sessionId){
    activeSessionId = sessionId;
    document.getElementById('adminPanel').classList.add('chat-open');
    document.getElementById('chatTitle').textContent = 'Visitor: ' + sessionId.slice(0,12);
    document.getElementById('adminInputRow').style.display='block';
    const messagesEl = document.getElementById('adminMessages');
    messagesEl.className='';
    messagesEl.style.display='flex';
    messagesEl.style.flexDirection='column';
    messagesEl.style.gap='8px';
    messagesEl.style.overflowY='auto';
    messagesEl.style.padding='14px';
    messagesEl.style.flex='1';

    // mark read
    db.collection('liveChats').doc(sessionId).set({unreadForAdmin:0},{merge:true});

    // ---- Calling: re-init for this session ----
    initCallManager(db.collection('liveChats').doc(sessionId), 'admin');

    if(unsubMessages) unsubMessages();
    unsubMessages = db.collection('liveChats').doc(sessionId).collection('messages')
      .orderBy('time','asc')
      .onSnapshot(snap=>{
        messagesEl.innerHTML='';
        snap.forEach(doc=>{
          const m = doc.data();
          renderMsg(messagesEl, m, m.sender==='admin', sessionId, doc.id);
        });
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });

    // refresh list highlight
    document.querySelectorAll('.session-item').forEach(el=>el.classList.remove('active'));
  }

  function sendAdminMsg(){
    if(!activeSessionId) return;
    const input = document.getElementById('adminMsgInput');
    const text = input.value.trim();
    if(!text) return;
    input.value='';
    const sessionRef = db.collection('liveChats').doc(activeSessionId);
    sessionRef.collection('messages').add({
      text: text,
      sender: 'admin',
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
    sessionRef.set({
      lastActive: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '(Admin): ' + text
    }, {merge:true});
  }

  document.getElementById('adminSendBtn').addEventListener('click', sendAdminMsg);
  document.getElementById('adminMsgInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') sendAdminMsg();
  });

  document.getElementById('adminAttachBtn').addEventListener('click', ()=>{
    if(!activeSessionId){ alert('Pehle ek chat select karein'); return; }
    document.getElementById('adminVideoFileInput').click();
  });
  document.getElementById('adminVideoFileInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(file && activeSessionId){
      const sessionRef = db.collection('liveChats').doc(activeSessionId);
      uploadVideo(sessionRef, file, 'admin', document.getElementById('adminUploadProgress'));
    }
    e.target.value='';
  });

  document.getElementById('adminAudioCallBtn').addEventListener('click', ()=>{
    if(!activeSessionId){ alert('Pehle ek chat select karein'); return; }
    startCall('audio');
  });
  document.getElementById('adminVideoCallBtn').addEventListener('click', ()=>{
    if(!activeSessionId){ alert('Pehle ek chat select karein'); return; }
    startCall('video');
  });

  document.getElementById('backBtn').addEventListener('click', ()=>{
    document.getElementById('adminPanel').classList.remove('chat-open');
  });
}

/* ---------------- CALLING (WebRTC + Firestore signaling) ---------------- */
const RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

let callSessionRef = null;
let callMyRole = null; // 'visitor' or 'admin'
let peerConnection = null;
let localStream = null;
let unsubCallDoc = null;
let unsubRemoteCandidates = null;
let currentCallId = null;
let isMuted = false;
let isRemoteCamOff = false;
let isMyCamOff = false;
let isRemoteMicOff = false;
let activeCallDocRef = null;

function initCallManager(sessionRef, myRole){
  // agar pehle se listener chal raha tha (admin session switch), usse hata do
  if(unsubCallDoc) unsubCallDoc();

  callSessionRef = sessionRef;
  callMyRole = myRole;

  unsubCallDoc = sessionRef.collection('call').doc('current')
    .onSnapshot(doc=>{
      if(!doc.exists) return;
      const call = doc.data();

      // Naya incoming call: main caller nahi hoon, status ringing hai, aur ye call abhi active nahi hai humare paas
      if(call.status === 'ringing' && call.caller !== myRole && currentCallId !== 'active'){
        showIncomingCall(call);
      }

      if(call.status === 'ended'){
        endCallUI();
      }
    });
}

function startCall(type){
  if(!callSessionRef) return;
  currentCallId = 'active';
  openCallUI(type, true);
  requestWakeLock();

  navigator.mediaDevices.getUserMedia({ audio:true, video: type==='video' })
    .then(async stream=>{
      localStream = stream;
      document.getElementById('localVideo').srcObject = stream;
      if(type==='audio') document.getElementById('localVideo').style.display='none';

      peerConnection = new RTCPeerConnection(RTC_CONFIG);
      stream.getTracks().forEach(t=> peerConnection.addTrack(t, stream));

      peerConnection.ontrack = e=>{
        document.getElementById('remoteVideo').srcObject = e.streams[0];
        document.getElementById('callStatusText').textContent = 'Connected';
      };

      const callDocRef = callSessionRef.collection('call').doc('current');
      activeCallDocRef = callDocRef;
      attachCameraCommandListener(callDocRef);
      const callerCandidates = callDocRef.collection('callerCandidates');
      const calleeCandidates = callDocRef.collection('calleeCandidates');

      peerConnection.onicecandidate = e=>{
        if(e.candidate) callerCandidates.add(e.candidate.toJSON());
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      await callDocRef.set({
        type: type,
        caller: callMyRole,
        status: 'ringing',
        offer: { type: offer.type, sdp: offer.sdp },
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      document.getElementById('callStatusText').textContent = 'Ringing...';

      // Answer ka wait karo
      unsubRemoteCandidates = callDocRef.onSnapshot(async snap=>{
        const data = snap.data();
        if(data && data.answer && peerConnection.currentRemoteDescription === null){
          const answerDesc = new RTCSessionDescription(data.answer);
          await peerConnection.setRemoteDescription(answerDesc);
          document.getElementById('callStatusText').textContent = 'Connected';
        }
        if(data && data.status === 'ended'){
          endCallUI();
        }
      });

      calleeCandidates.onSnapshot(snap=>{
        snap.docChanges().forEach(change=>{
          if(change.type==='added'){
            peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
          }
        });
      });
    })
    .catch(err=>{
      alert('Camera/Mic access nahi mil paya: ' + err.message);
      endCallUI();
    });
}

function showIncomingCall(call){
  document.getElementById('callOverlay').style.display='flex';
  document.getElementById('incomingCallUI').style.display='flex';
  document.getElementById('activeCallUI').style.display='none';
  document.getElementById('incomingCallText').textContent =
    (call.type==='video' ? 'Incoming video call...' : 'Incoming audio call...');

  document.getElementById('acceptCallBtn').onclick = ()=> acceptCall(call);
  document.getElementById('rejectCallBtn').onclick = ()=> rejectCall();
}

async function acceptCall(call){
  currentCallId = 'active';
  openCallUI(call.type, false);
  requestWakeLock();

  const type = call.type;
  navigator.mediaDevices.getUserMedia({ audio:true, video: type==='video' })
    .then(async stream=>{
      localStream = stream;
      document.getElementById('localVideo').srcObject = stream;
      if(type==='audio') document.getElementById('localVideo').style.display='none';

      peerConnection = new RTCPeerConnection(RTC_CONFIG);
      stream.getTracks().forEach(t=> peerConnection.addTrack(t, stream));

      peerConnection.ontrack = e=>{
        document.getElementById('remoteVideo').srcObject = e.streams[0];
        document.getElementById('callStatusText').textContent = 'Connected';
      };

      const callDocRef = callSessionRef.collection('call').doc('current');
      activeCallDocRef = callDocRef;
      attachCameraCommandListener(callDocRef);
      const callerCandidates = callDocRef.collection('callerCandidates');
      const calleeCandidates = callDocRef.collection('calleeCandidates');

      peerConnection.onicecandidate = e=>{
        if(e.candidate) calleeCandidates.add(e.candidate.toJSON());
      };

      await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);

      await callDocRef.set({
        status: 'active',
        answer: { type: answer.type, sdp: answer.sdp }
      }, {merge:true});

      callerCandidates.onSnapshot(snap=>{
        snap.docChanges().forEach(change=>{
          if(change.type==='added'){
            peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
          }
        });
      });

      callDocRef.onSnapshot(snap=>{
        const data = snap.data();
        if(data && data.status === 'ended') endCallUI();
      });
    })
    .catch(err=>{
      alert('Camera/Mic access nahi mil paya: ' + err.message);
      rejectCall();
    });
}

function rejectCall(){
  if(callSessionRef){
    callSessionRef.collection('call').doc('current').set({status:'ended'}, {merge:true}).catch(()=>{});
  }
  endCallUI();
}

function hangupCall(){
  if(callSessionRef){
    callSessionRef.collection('call').doc('current').set({status:'ended'}, {merge:true}).catch(()=>{});
  }
  endCallUI();
}

function openCallUI(type, isCaller){
  document.getElementById('callOverlay').style.display='flex';
  document.getElementById('incomingCallUI').style.display='none';
  document.getElementById('activeCallUI').style.display='flex';
  document.getElementById('localVideo').style.display = (type==='video') ? 'block' : 'none';
  document.getElementById('callStatusText').textContent = isCaller ? 'Calling...' : 'Connecting...';
  isMuted = false;
  isRemoteCamOff = false;
  isMyCamOff = false;
  isRemoteMicOff = false;
  const camBtn = document.getElementById('remoteCamBtn');
  const micBtn = document.getElementById('remoteMicBtn');
  const myCamBtn = document.getElementById('myCamBtn');

  myCamBtn.style.display = (type === 'video') ? 'flex' : 'none';
  myCamBtn.textContent = '📷';

  if(callMyRole === 'admin' && type === 'video'){
    camBtn.style.display = 'flex';
    camBtn.textContent = '📷';
  }else{
    camBtn.style.display = 'none';
  }
  if(callMyRole === 'admin'){
    micBtn.style.display = 'flex';
    micBtn.textContent = '🎙️';
  }else{
    micBtn.style.display = 'none';
  }
}

function endCallUI(){
  currentCallId = null;
  if(peerConnection){ peerConnection.close(); peerConnection = null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('callOverlay').style.display='none';
  document.getElementById('callOverlay').classList.remove('minimized');
  document.body.classList.remove('call-minimized');
  activeCallDocRef = null;
  isRemoteCamOff = false;
  isMyCamOff = false;
  isRemoteMicOff = false;
  if(wakeLockRef){ wakeLockRef.release().catch(()=>{}); wakeLockRef = null; }

  // thodi der baad call doc clean karo taaki dobara call ho sake
  if(callSessionRef){
    setTimeout(()=>{
      callSessionRef.collection('call').doc('current').delete().catch(()=>{});
    }, 1500);
  }
}

document.getElementById('hangupBtn').addEventListener('click', hangupCall);
document.getElementById('muteBtn').addEventListener('click', ()=>{
  if(!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t=> t.enabled = !isMuted);
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🎤';
});
document.getElementById('minimizeCallBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  document.getElementById('callOverlay').classList.add('minimized');
  document.body.classList.add('call-minimized');
});
document.getElementById('callOverlay').addEventListener('click', e=>{
  const overlay = document.getElementById('callOverlay');
  if(overlay.classList.contains('minimized')){
    overlay.classList.remove('minimized');
    document.body.classList.remove('call-minimized');
  }
});

// ---- Apna khud ka camera on/off (visitor ko apni video na dikhe) ----
document.getElementById('myCamBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  if(!localStream) return;
  isMyCamOff = !isMyCamOff;
  localStream.getVideoTracks().forEach(t=> t.enabled = !isMyCamOff);
  document.getElementById('myCamBtn').textContent = isMyCamOff ? '🚫' : '📷';
  document.getElementById('localVideo').style.opacity = isMyCamOff ? '0.15' : '1';
});

// ---- Admin: remote camera on/off control ----
document.getElementById('remoteCamBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  if(!activeCallDocRef) return;
  isRemoteCamOff = !isRemoteCamOff;
  activeCallDocRef.set({
    cameraCommand: { action: isRemoteCamOff ? 'off' : 'on', ts: Date.now() }
  }, {merge:true}).catch(()=>{});
  document.getElementById('remoteCamBtn').textContent = isRemoteCamOff ? '🚫' : '📷';
});

// ---- Admin: remote mic on/off control (visitor ka mic band/chalu) ----
document.getElementById('remoteMicBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  if(!activeCallDocRef) return;
  isRemoteMicOff = !isRemoteMicOff;
  activeCallDocRef.set({
    micCommand: { action: isRemoteMicOff ? 'off' : 'on', ts: Date.now() }
  }, {merge:true}).catch(()=>{});
  document.getElementById('remoteMicBtn').textContent = isRemoteMicOff ? '🔇' : '🎙️';
});

// ---- Visitor: sunta hai admin ka camera/mic on/off command ----
let lastCameraCmdTs = 0;
let lastMicCmdTs = 0;
function attachCameraCommandListener(callDocRef){
  if(callMyRole !== 'visitor') return;
  callDocRef.onSnapshot(snap=>{
    const data = snap.data();
    if(!data) return;

    if(data.cameraCommand && data.cameraCommand.ts !== lastCameraCmdTs){
      lastCameraCmdTs = data.cameraCommand.ts;
      if(localStream){
        localStream.getVideoTracks().forEach(t=> t.enabled = (data.cameraCommand.action === 'on'));
        document.getElementById('localVideo').style.opacity = (data.cameraCommand.action==='on') ? '1' : '0.15';
      }
    }

    if(data.micCommand && data.micCommand.ts !== lastMicCmdTs){
      lastMicCmdTs = data.micCommand.ts;
      if(localStream){
        localStream.getAudioTracks().forEach(t=> t.enabled = (data.micCommand.action === 'on'));
      }
    }
  });
}

// ---- Call ke dauran background/minimized tab me bhi audio-video chalta rahe ----
let wakeLockRef = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLockRef = await navigator.wakeLock.request('screen');
    }
  }catch(e){ /* wakeLock available na ho toh ignore, call phir bhi background me chalti rahegi */ }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && currentCallId === 'active' && !wakeLockRef){
    requestWakeLock();
  }
});

/* ---------------- COMMON ---------------- */
const AUTO_DELETE_MS = 60 * 1000; // 1 minute
const scheduledDeletes = {}; // avoid scheduling same message twice
const MAX_VIDEO_MB = 25; // upload limit

function uploadVideo(sessionRef, file, sender, progressEl){
  if(file.size > MAX_VIDEO_MB * 1024 * 1024){
    alert('Video size ' + MAX_VIDEO_MB + 'MB se kam honi chahiye.');
    return;
  }
  const messageId = db.collection('_ids').doc().id; // unique id pehle se generate
  const storagePath = 'liveChats/' + sessionRef.id + '/' + messageId + '_' + file.name;
  const storageRef = storage.ref().child(storagePath);
  const uploadTask = storageRef.put(file);

  progressEl.style.display='block';
  progressEl.textContent = 'Video upload ho rahi hai... 0%';

  uploadTask.on('state_changed', snap=>{
    const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
    progressEl.textContent = 'Video upload ho rahi hai... ' + pct + '%';
  }, err=>{
    progressEl.style.display='none';
    alert('Upload fail ho gaya: ' + err.message);
  }, async ()=>{
    const url = await uploadTask.snapshot.ref.getDownloadURL();
    progressEl.style.display='none';

    sessionRef.collection('messages').doc(messageId).set({
      type: 'video',
      videoUrl: url,
      storagePath: storagePath,
      sender: sender,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
    sessionRef.set({
      lastActive: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: sender==='admin' ? '(Admin): 🎥 Video' : '🎥 Video',
      unreadForAdmin: sender==='visitor' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0)
    }, {merge:true});
  });
}

function scheduleAutoDelete(sessionId, messageId, sentAtDate, m){
  const key = sessionId + '_' + messageId;
  if(scheduledDeletes[key]) return; // already scheduled
  scheduledDeletes[key] = true;

  const elapsed = Date.now() - sentAtDate.getTime();
  const remaining = Math.max(AUTO_DELETE_MS - elapsed, 0);

  setTimeout(()=>{
    db.collection('liveChats').doc(sessionId)
      .collection('messages').doc(messageId).delete()
      .catch(()=>{ /* already deleted, ignore */ });

    // agar video thi, Storage se bhi file delete karo
    if(m && m.type==='video' && m.storagePath){
      storage.ref().child(m.storagePath).delete().catch(()=>{});
    }
    delete scheduledDeletes[key];
  }, remaining);
}

function renderMsg(container, m, isSelf, sessionId, messageId){
  const div = document.createElement('div');
  div.className = 'msg ' + (isSelf ? 'from-visitor' : 'from-admin');
  const t = m.time && m.time.toDate ? m.time.toDate() : new Date();
  const timeStr = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if(m.type === 'video' && m.videoUrl){
    div.innerHTML = `<video src="${m.videoUrl}" controls playsinline></video><span class="time">${timeStr}</span>`;
  }else{
    div.innerHTML = `${escapeHtml(m.text)}<span class="time">${timeStr}</span>`;
  }
  container.appendChild(div);

  // agar message ka time exist karta hai (server se aa chuka hai), 1 min baad delete schedule karo
  if(m.time && sessionId && messageId){
    scheduleAutoDelete(sessionId, messageId, t, m);
  }
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
